name: Vetrix Windows Package

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  portable:
    name: Build and smoke-test Windows portable
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build embedded frontend
        shell: pwsh
        run: |
          Set-Location frontend
          npm ci
          npm audit --audit-level=high
          $env:VITE_API_URL = "http://127.0.0.1:8001"
          npm run audit:routes
          npm run build
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install packaging dependencies
        run: |
          python -m pip install -r backend/requirements.txt
          python -m pip install pyinstaller==6.16.0
          python -m pip check
      - name: Build portable executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --name VetrixERP --paths backend --collect-submodules app --collect-all reportlab --collect-all arabic_reshaper --add-data "frontend/dist;frontend_dist" --version-file "scripts/windows/version_info.txt" backend/desktop_launcher.py
      - name: Smoke test packaged application
        shell: pwsh
        run: |
          $env:VETRIX_NO_BROWSER = "1"
          $env:VETRIX_NO_PAUSE = "1"
          $process = Start-Process ".\dist\VetrixERP.exe" -PassThru
          try {
            $ready = $false
            for ($i = 0; $i -lt 60; $i++) {
              Start-Sleep -Milliseconds 500
              try {
                $response = Invoke-RestMethod "http://127.0.0.1:8001/" -TimeoutSec 2
                if ($response.version -eq "1.2.0") {
                  $ready = $true
                  break
                }
              } catch {}
              if ($process.HasExited) { break }
            }
            if (-not $ready) { throw "Packaged Vetrix API did not become ready." }
            $page = Invoke-WebRequest "http://127.0.0.1:5173/" -UseBasicParsing
            if ($page.StatusCode -ne 200 -or $page.Content -notmatch "root") {
              throw "Embedded frontend smoke test failed."
            }
          } finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }
      - name: Create portable archive and checksum
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item dist/VetrixERP.exe package/VetrixERP.exe
          Copy-Item WINDOWS_PORTABLE.md package/README.txt
          Compress-Archive -Path package/* -DestinationPath VetrixERP-Windows-x64.zip
          (Get-FileHash VetrixERP-Windows-x64.zip -Algorithm SHA256).Hash | Set-Content VetrixERP-Windows-x64.sha256
      - name: Upload Windows portable
        uses: actions/upload-artifact@v4
        with:
          name: VetrixERP-Windows-x64
          path: |
            VetrixERP-Windows-x64.zip
            VetrixERP-Windows-x64.sha256
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish official v1.2.0 release
    needs: portable
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Download verified Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: VetrixERP-Windows-x64
          path: release-assets
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.2.0 >/dev/null 2>&1; then
            echo "Release v1.2.0 already exists; refusing to replace immutable assets."
            exit 0
          fi
          gh release create v1.2.0             release-assets/VetrixERP-Windows-x64.zip             release-assets/VetrixERP-Windows-x64.sha256             --target "$GITHUB_SHA"             --title "Vetrix ERP 1.2.0"             --notes-file RELEASE_NOTES.md
